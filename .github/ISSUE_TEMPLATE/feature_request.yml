name: Feature Request
description: Propose a new feature or enhancement for the Ardtire Governance Platform
title: "feat: "
labels: [enhancement, needs-triage]
assignees: [thomascarter613]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for proposing a feature. Complete all sections below.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? What is the current limitation?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature and how it should work.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What alternatives were considered and why are they insufficient?
    validations:
      required: false

  - type: dropdown
    id: domain
    attributes:
      label: Governance Domain
      description: Which platform domain does this feature relate to?
      options:
        - Membership
        - Proposals
        - Deliberation
        - Voting
        - Ratification
        - Publication
        - Audit & Records
        - Authentication & Access
        - Administration
        - Infrastructure
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Supporting material, references, or prior art.
    validations:
      required: false
