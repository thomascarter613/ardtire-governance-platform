name: Bug Report
description: Report a reproducible bug in the Ardtire Governance Platform
title: "fix: "
labels: [bug, needs-triage]
assignees: [thomascarter613]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Complete all sections below.
        Incomplete reports may be closed without action.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal, complete, and reproducible steps.
      placeholder: |
        1. Navigate to '...'
        2. Click on '...'
        3. Observe '...'
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
      description: What actually happened? Include screenshots or logs if relevant.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Platform Version or Commit SHA
      placeholder: e.g. 0.1.0 or abc1234
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Local development
        - Staging
        - Production
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other relevant context.
    validations:
      required: false
