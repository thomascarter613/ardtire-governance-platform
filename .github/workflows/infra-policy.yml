name: Infrastructure Policy

on:
  push:
    branches: [main]
    paths:
      - "infra/**"
      - "docker-compose.yml"
      - ".checkov.yaml"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths:
      - "infra/**"
      - "docker-compose.yml"
      - ".checkov.yaml"
      - ".github/workflows/**"
  schedule:
    # Run weekly even without changes to catch newly released checks.
    - cron: "0 7 * * 1"
  workflow_dispatch:

jobs:
  checkov:
    name: Checkov Policy Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov
        # Pinned to a specific release tag. Update via Renovate or manually.
        # To harden further, replace this tag with a full commit SHA.
        uses: bridgecrewio/checkov-action@v12.2950.0
        with:
          config_file: .checkov.yaml
          output_format: cli,sarif
          output_file_path: console,checkov-results.sarif
          download_external_modules: false

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov-results.sarif
          category: checkov
